server {
    server_name mdmip.ru www.mdmip.ru;

    # Увеличиваем размер загружаемых файлов
    client_max_body_size 100M;

    # Логи
    access_log /var/log/nginx/mdmip.ru.access.log;
    error_log /var/log/nginx/mdmip.ru.error.log;

    # API запросы -> Backend (порт 8001)
    location /api/ {
        proxy_pass http://localhost:8001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # ЖЕСТКАЯ ФИКСАЦИЯ РЕДИРЕКТОВ
        # Если бэкенд возвращает http://mdmip.ru/... -> меняем на https://mdmip.ru/api/...
        proxy_redirect http://mdmip.ru/ https://mdmip.ru/api/;
        proxy_redirect https://mdmip.ru/ https://mdmip.ru/api/;
        proxy_redirect http://localhost:8001/ https://mdmip.ru/api/;
        proxy_redirect / /api/;
    }

    # Статические файлы бэкенда (uploads, отчёты)
    location /uploads/ {
        proxy_pass http://localhost:8001/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /valuation_reports/ {
        proxy_pass http://localhost:8001/valuation_reports/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Все остальные запросы -> Frontend (порт 3001)
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mdmip.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mdmip.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.mdmip.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = mdmip.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name mdmip.ru www.mdmip.ru;
    return 301 https://$host$request_uri;
}
